name: Release

on:
  push:
    tags:
      - "v*"
      # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write
  # needed to create GitHub releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is auto-provided by Actions, no setup needed
